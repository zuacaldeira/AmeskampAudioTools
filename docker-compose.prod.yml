services:
  app:
    build: .
    container_name: silence-trimmer-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    tmpfs:
      - /tmp:size=2G
    environment:
      - TMPDIR=/tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
